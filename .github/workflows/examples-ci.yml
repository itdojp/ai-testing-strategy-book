name: Examples CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run AI safety hostile fixture
        run: |
          python3 examples/ai-safety/checker.py
          python3 examples/ai-safety/checker.py --self-test
      - name: Run statistical decision fixture
        run: |
          python3 examples/statistical-decision/checker.py
          python3 examples/statistical-decision/checker.py --self-test
      - name: Install dependencies
        run: python3 -m pip install -r examples/python/requirements.txt
      - name: Run tests
        run: |
          cd examples/python
          python3 -m pytest -q --cov=discount --cov-report=term-missing --cov-fail-under=100

  node:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci --prefix examples/node
      - name: Lint (syntax check)
        run: npm run lint --prefix examples/node
      - name: Run tests
        run: npm test --prefix examples/node
