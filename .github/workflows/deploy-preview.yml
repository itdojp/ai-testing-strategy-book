name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  # Keep JavaScript actions on the Node 24 runtime while the ecosystem transition is active.
  # Ref: https://github.blog/changelog/2026-03-06-github-actions-transitions-from-node-20-to-node-24/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # The preview build does not run browser tests; skip Puppeteer's browser download.
  PUPPETEER_SKIP_DOWNLOAD: 'true'

permissions:
  contents: write
  pull-requests: write

concurrency:
  # Every preview writes to the shared gh-pages branch; serialize those writes.
  group: preview-${{ github.workflow }}-gh-pages
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
        
      - name: Install dependencies
        run: npm ci
      
      - name: Build with preview baseurl
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # The build copies src/_config.yml into docs, so update the source first.
          repo_name="${GITHUB_REPOSITORY#*/}"
          preview_baseurl="/${repo_name}/pr-preview/pr-${PR_NUMBER}"
          sed -i "s|^baseurl:.*|baseurl: \"${preview_baseurl}\"|" src/_config.yml

          npm run build

          # Fail rather than deploy a preview with production link paths.
          grep -Fx "baseurl: \"${preview_baseurl}\"" docs/_config.yml
        
      - name: Deploy to preview environment
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: ./docs/
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: true
          force: false
          commit-message: Deploy preview for PR ${{ github.event.pull_request.number }}
        
      - name: Comment preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-preview/pr-${prNumber}/`;
          
            const sanitizeInlineCode = (value) => String(value ?? '')
              .replace(/[\u0000-\u001f\u007f]/g, '-')
              .replace(/`/g, "'");
            const branch = sanitizeInlineCode(context.payload.pull_request.head.ref);
            const commit = sanitizeInlineCode(context.payload.pull_request.head.sha.slice(0, 7));
            const comment = `## 📚 Preview Deployment\n\nYour changes have been deployed to a preview environment:\n\n🔗 **Preview URL**: ${previewUrl}\n\n---\n\n<details>\n<summary>Preview Details</summary>\n\n- Branch: \`${branch}\`\n- Commit: \`${commit}\`\n- Updated: ${new Date().toUTCString()}\n\n</details>`;
          
            // Find existing comment
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });
          
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Preview Deployment')
            );
          
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v6

      - name: Prepare empty preview directory
        env:
          EMPTY_PREVIEW_DIR: ${{ runner.temp }}/empty-preview
        run: |
          rm -rf -- "$EMPTY_PREVIEW_DIR"
          mkdir -p -- "$EMPTY_PREVIEW_DIR"

      - name: Remove preview deployment
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: ${{ runner.temp }}/empty-preview
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: true
          force: false
          commit-message: Remove preview for PR ${{ github.event.pull_request.number }}

      - name: Remove empty preview directory
        if: always()
        env:
          EMPTY_PREVIEW_DIR: ${{ runner.temp }}/empty-preview
        run: rm -rf -- "$EMPTY_PREVIEW_DIR"

      - name: Mark preview comment as removed
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comment = `## 📚 Preview Deployment\n\n🗑️ **Preview Removed**\n\nThe preview deployment was removed because this pull request was closed.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            }
