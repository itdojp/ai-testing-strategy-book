name: Scheduled Maintenance

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies and build published site
        id: build
        shell: bash
        run: |
          set -o pipefail
          npm ci --omit=optional 2>&1 | tee build.log
          npm run build 2>&1 | tee -a build.log

      - name: Test maintenance state contract
        run: node scripts/test-scheduled-maintenance.js

      - name: Check outdated dependencies
        id: outdated
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm outdated > outdated.log 2>&1
          rc=$?
          cat outdated.log >> "$GITHUB_STEP_SUMMARY"
          echo "found=$([ "$rc" -eq 0 ] && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Security audit
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm audit --omit=dev > audit.log 2>&1
          rc=$?
          cat audit.log >> "$GITHUB_STEP_SUMMARY"
          echo "found=$([ "$rc" -eq 0 ] && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Check external links
        id: links
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm install --global linkinator
          linkinator public --recurse --skip 'localhost|127.0.0.1' --timeout 30000 > links.log 2>&1
          rc=$?
          cat links.log >> "$GITHUB_STEP_SUMMARY"
          echo "found=$([ "$rc" -eq 0 ] && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Create or update maintenance issue
        if: always() && (steps.outdated.outputs.found == 'true' || steps.audit.outputs.found == 'true' || steps.links.outputs.found == 'true' || steps.build.outcome == 'failure')
        uses: actions/github-script@v9
        env:
          OUTDATED: ${{ steps.outdated.outputs.found || 'false' }}
          AUDIT: ${{ steps.audit.outputs.found || 'false' }}
          LINKS: ${{ steps.links.outputs.found || 'false' }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const marker = '<!-- scheduled-maintenance -->';
            const title = `Scheduled Maintenance Check - ${new Date().toISOString().split('T')[0]}`;
            const body = `${marker}
            ## Automated Maintenance Check

            | Check | Result |
            | --- | --- |
            | Install/build infrastructure | ${process.env.BUILD_OUTCOME} |
            | Outdated dependencies | ${process.env.OUTDATED} |
            | Production audit findings | ${process.env.AUDIT} |
            | External link findings | ${process.env.LINKS} |

            Detection findings and command infrastructure failures are reported separately in the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}).
            ${marker}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'maintenance,automated', per_page: 100});
            const existing = issues.find(issue => issue.body?.includes(marker));
            if (existing) {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body, title});
            } else {
              await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['maintenance', 'automated']});
            }

      - name: Fail on infrastructure error
        if: steps.build.outcome == 'failure'
        run: exit 1
