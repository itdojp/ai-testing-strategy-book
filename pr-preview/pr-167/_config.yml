title: "AI主導開発時代のソフトウェアテスト戦略"
description: "品質保証の新パラダイム - AI生成コードに対応した実践的テスト手法"
author: "ITDO Inc."
baseurl: "/pr-preview/pr-167"
url: "https://itdojp.github.io"

# v3.0 Design System Configuration
markdown: kramdown
highlighter: rouge

# Use custom book layout as default
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "book"

# plugins:
#   - jekyll-feed

# Repository information for edit links
repository:
  github: "itdojp/book-publishing-template2"

exclude:
  - node_modules/
  - scripts/
  - templates/
  - src/
  - package*.json
  - README.md
  - "*.tmp"
  - Gemfile*
